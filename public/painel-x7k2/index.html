<!doctype html>
<html lang="pt-BR" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notas de Berlim — Admin</title>
  <script>window.CMS_MANUAL_INIT = true</script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <div style="background:#0a0a0a;border-bottom:3px solid #F0D722;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;font-family:monospace;font-size:12px;">
    <div style="display:flex;gap:20px;">
      <button onclick="toggleView('cms')" id="btn-cms" style="background:none;border:none;color:#F0D722;cursor:pointer;font-weight:bold;text-transform:uppercase;">📝 Conteúdo</button>
      <button onclick="toggleView('comments')" id="btn-comments" style="background:none;border:none;color:#888;cursor:pointer;font-weight:bold;text-transform:uppercase;">💬 Comentários</button>
      <button onclick="toggleView('audience')" id="btn-audience" style="background:none;border:none;color:#888;cursor:pointer;font-weight:bold;text-transform:uppercase;">👥 Audiência</button>
    </div>
    <div style="display:flex;gap:20px;align-items:center;">
      <a href="/" style="color:#888;text-decoration:none;letter-spacing:1px;text-transform:uppercase;font-weight:bold;">⌂ Site</a>
      <a href="/painel-x7k2/preview.html" style="color:#F0D722;text-decoration:none;letter-spacing:1px;text-transform:uppercase;">Preview de Email →</a>
      <button onclick="logout()" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:10px;">SAIR</button>
    </div>
  </div>

  <!-- Audiência -->
  <div id="audience-admin" style="display:none; padding: 48px 24px; font-family: monospace; background: #f5f4f0; min-height: 100vh; max-width: 800px;">
    <p style="font-size:11px;letter-spacing:0.15em;color:#888;text-transform:uppercase;margin:0 0 16px;">LISTA DE INSCRITOS</p>
    <div id="audience-total" style="font-size:80px;font-weight:bold;line-height:1;color:#0a0a0a;">—</div>
    <p id="audience-label" style="font-size:14px;color:#666;margin:8px 0 48px;">carregando...</p>
    <div id="audience-contacts"></div>
  </div>

  <!-- Custom Comments Admin -->
  <div id="comments-admin" style="display:none; padding: 24px; font-family: sans-serif; background: #f5f4f0; min-height: 100vh;">
    <h2 style="font-family: monospace; text-transform: uppercase;">Moderação de Comentários</h2>
    <div id="comments-list" style="margin-top: 24px; display: grid; gap: 16px;">
      <p>Carregando...</p>
    </div>
  </div>

  <script>
    let adminSecret = localStorage.getItem('nb_admin_secret');
    let cmsInitialized = false;

    function checkAuth() {
      if (!adminSecret) {
        adminSecret = prompt('Senha de administração (Secret):');
        if (adminSecret) {
          localStorage.setItem('nb_admin_secret', adminSecret);
        }
      }
      return adminSecret;
    }

    function initCms() {
      if (cmsInitialized) return;
      cmsInitialized = true;

      CMS.init({
        config: {
          publish_mode: 'editorial_workflow',
          backend: {
            name: 'github',
            repo: 'renatoxavier12/notas-de-berlim',
            branch: 'main',
            base_url: 'https://notasdeberlim.com',
            auth_endpoint: 'api/auth',
          },
          media_folder: 'public',
          public_folder: '/',
          collections: [
            {
              name: 'edicoes',
              label: 'Edições',
              folder: 'src/edicoes',
              create: true,
              slug: '{{slug}}',
              fields: [
                { label: 'Número (#)', name: 'id', widget: 'number', value_type: 'int' },
                { label: 'Título', name: 'title', widget: 'string' },
                { label: 'Data', name: 'data', widget: 'string', hint: 'Ex: 21 de março de 2026' },
                { label: 'Bairro / Local', name: 'bairro', widget: 'string', hint: 'Ex: Kreuzberg / Wrangelkiez' },
                { label: 'Teaser', name: 'teaser', widget: 'text', hint: 'Frase que aparece na lista de edições' },
                { label: 'Foto de capa', name: 'capa', widget: 'image', required: false },
                { label: 'Corpo', name: 'body', widget: 'markdown' },
              ],
            },
            {
              name: 'diario',
              label: 'Diário',
              folder: 'src/diario',
              create: true,
              slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
              fields: [
                { label: 'Data', name: 'data', widget: 'string', hint: 'Ex: 31 de março de 2026' },
                { label: 'Foto', name: 'foto', widget: 'image', required: false },
                { label: 'Vídeo (YouTube URL)', name: 'video', widget: 'string', required: false },
                { label: 'Texto', name: 'body', widget: 'markdown' },
              ],
            },
          ],
        },
      })
    }

    function logout() {
      localStorage.removeItem('nb_admin_secret');
      location.reload();
    }

    function toggleView(view) {
      if (!checkAuth()) return;

      const cms = document.querySelector('#nc-root');
      const comments = document.querySelector('#comments-admin');
      const audience = document.querySelector('#audience-admin');
      const btns = { cms: '#btn-cms', comments: '#btn-comments', audience: '#btn-audience' };

      if (cms) cms.style.display = view === 'cms' ? 'block' : 'none';
      comments.style.display = view === 'comments' ? 'block' : 'none';
      audience.style.display = view === 'audience' ? 'block' : 'none';

      Object.keys(btns).forEach(k => {
        document.querySelector(btns[k]).style.color = k === view ? '#F0D722' : '#888';
      });

      if (view === 'cms') initCms();
      if (view === 'comments') loadComments();
      if (view === 'audience') loadAudience();
    }

    async function loadAudience() {
      try {
        const res = await fetch('/api/audience?secret=' + adminSecret, {
          headers: { 'x-admin-secret': adminSecret }
        });
        if (!res.ok) throw new Error('Auth failed');
        const data = await res.json();
        document.querySelector('#audience-total').textContent = data.total ?? '—';
        document.querySelector('#audience-label').textContent = data.total === 1 ? 'inscrito' : 'inscritos';

        const contacts = data.contacts ?? [];
        const container = document.querySelector('#audience-contacts');
        if (contacts.length === 0) {
          container.innerHTML = '';
          return;
        }
        container.innerHTML = `
          <p style="font-size:11px;letter-spacing:0.15em;color:#888;text-transform:uppercase;margin:0 0 16px;">ÚLTIMOS 100</p>
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead>
              <tr style="border-bottom:2px solid #0a0a0a;">
                <th style="text-align:left;padding:8px 0;font-size:11px;letter-spacing:0.1em;">EMAIL</th>
                <th style="text-align:right;padding:8px 0;font-size:11px;letter-spacing:0.1em;">INSCRITO EM</th>
              </tr>
            </thead>
            <tbody>
              ${contacts.map(c => `
                <tr style="border-bottom:1px solid #ddd;">
                  <td style="padding:10px 0;color:#0a0a0a;">${c.email}</td>
                  <td style="padding:10px 0;color:#888;text-align:right;">${c.createdAt ? new Date(c.createdAt).toLocaleDateString('pt-BR') : '—'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      } catch {
        document.querySelector('#audience-label').textContent = 'erro de autenticação';
        logout();
      }
    }

    async function loadComments() {
      const list = document.querySelector('#comments-list');
      try {
        const res = await fetch('/api/comments?action=admin_list&secret=' + adminSecret, {
          headers: { 'x-admin-secret': adminSecret }
        });
        if (!res.ok) throw new Error('Auth failed');
        const data = await res.json();
        
        if (data.length === 0) {
          list.innerHTML = '<p>Nenhum comentário encontrado.</p>';
          return;
        }

        list.innerHTML = data.map(c => `
          <div style="background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; border-left: 5px solid ${c.approved ? '#27ae60' : '#f0d722'}">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
              <strong style="text-transform: uppercase; font-size: 12px; font-family: monospace;">${c.name}</strong>
              <span style="font-size: 11px; color: #888;">${new Date(c.timestamp).toLocaleString()}</span>
            </div>
            <div style="font-size: 11px; color: #666; margin-bottom: 8px; font-family: monospace;">Post: ${c.slug}</div>
            <p style="margin: 0 0 16px 0; font-size: 15px; line-height: 1.5;">${c.text}</p>
            <div style="display: flex; gap: 10px;">
              ${!c.approved ? `
                <button onclick="moderate('${c.slug}', '${c.id}', 'approve')" style="background: #27ae60; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px;">APROVAR</button>
              ` : '<span style="color: #27ae60; font-size: 11px; font-weight: bold;">✓ APROVADO</span>'}
              <button onclick="moderate('${c.slug}', '${c.id}', 'delete')" style="background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px;">EXCLUIR</button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        list.innerHTML = '<p>Erro de autenticação.</p>';
        logout();
      }
    }

    async function moderate(slug, id, action) {
      if (action === 'delete' && !confirm('Tem certeza?')) return;
      try {
        const res = await fetch(`/api/comments?action=${action}&slug=${slug}&id=${id}`, {
          method: 'POST',
          headers: { 'x-admin-secret': adminSecret }
        });
        if (res.ok) loadComments();
        else alert('Erro: ' + res.statusText);
      } catch (e) {
        alert('Erro na moderação');
      }
    }
    if (checkAuth()) {
      toggleView('cms');
    }
  </script>
</body>
</html>
